name: Build ToDoList WinForms

on:
  push:
    paths:
      - "todo-list-winforms/**"
      - ".github/workflows/build-todo-list.yml"
  pull_request:
    paths:
      - "todo-list-winforms/**"
      - ".github/workflows/build-todo-list.yml"

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: todo-list-winforms

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ToDoList.sln

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: msbuild ToDoList.sln /p:Configuration=Release